<body>
  <a class="skip-link" href="#content">رفتن به محتوا</a>
  <main id="content">
    <section class="section">
      <div class="wrap hero-grid">
        <div>
          <h1>در تماس باشیم.</h1>
          <p>برای دریافت مشاوره، ثبت‌نام در برنامه‌های آموزشی یا ارسال سوالات، از فرم زیر استفاده کنید.</p>
          <div class="stats">
            <div class="stat-card">
              <strong>پاسخ‌گویی ۲۴ ساعته</strong>
              <span>پیگیری سریع پیام‌ها</span>
            </div>
            <div class="stat-card">
              <strong>مشاوره اختصاصی</strong>
              <span>برنامه شخصی برای هر دانش‌آموز</span>
            </div>
          </div>
        </div>
        <div class="hero-card reveal">
          <span class="hero-badge">پشتیبانی آنلاین</span>
          <img src="assets/images/hero.jpg" alt="ارتباط با دبیر" loading="lazy" />
        </div>
      </div>
    </section>

    <section class="section">
      <div class="wrap">
        <h2 class="section-title">فرم تماس</h2>
        <p class="section-subtitle">پیام شما در سریع‌ترین زمان پاسخ داده می‌شود.</p>
        <form class="form-grid" action="https://formspree.io/f/your-form-id" method="POST">
          <input type="text" name="name" placeholder="نام و نام خانوادگی" required />
          <input type="email" name="email" placeholder="ایمیل" required />
          <input type="tel" name="phone" placeholder="شماره تماس" />
          <textarea name="message" placeholder="پیام شما" required></textarea>
          <button class="btn btn-primary" type="submit">ارسال پیام</button>
        </form>
      </div>
    </section>
  </main>

  <script src="assets/JS/component-loader.js"></script>
  <script src="assets/JS/main.js"></script>

  <meta property="og:title" content="مشاهده جزوه | خان‌پایه" />

  <meta name="twitter:title" content="مشاهده جزوه | خان‌پایه" />

  <script defer data-domain="khanpaye-oloom.github.io" src="https://plausible.io/js/script.js"></script>
</head>

<body>
  <a class="skip-link" href="#content">رفتن به محتوا</a>
  <main id="content" class="section">
    <div class="wrap video-player">
      <div class="video-meta">
        <span class="tag">جزوه آموزشی</span>
        <h1 data-note-title>مشاهده جزوه</h1>
        <p data-note-description>این جزوه را به صورت آنلاین مرور کنید و سپس فایل را دانلود کنید.</p>
        <div class="actions">
          <a class="btn btn-ghost" href="library.html">بازگشت به کتابخانه</a>
          <a class="btn btn-primary" data-note-download href="#">دانلود جزوه</a>
        </div>
      </div>
      <div class="video-frame" style="padding-top: 70vh;">
        <iframe title="نمایش جزوه" src="" data-note-frame></iframe>
      </div>
    </div>
  </main>

  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const file = params.get('file');
      const title = params.get('title');
      const frame = document.querySelector('[data-note-frame]');
      const titleEl = document.querySelector('[data-note-title]');
      const downloadEl = document.querySelector('[data-note-download]');

      if (file && frame) {
        frame.src = file;
      }

      if (title && titleEl) {
        titleEl.textContent = title;
        document.title = `${title} | مشاهده جزوه - خان‌پایه`;
      }

      if (file && downloadEl) {
        downloadEl.href = file;
        downloadEl.setAttribute('download', '');
      }
    })();
  </script>
  <script src="assets/JS/component-loader.js"></script>
  <script src="assets/JS/main.js"></script>
</body>

</html>
